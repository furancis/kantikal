name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/visual-studio-prd

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Browser E2E
        run: npm run test:e2e

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Scan for credential literals
        run: npm run scan:credentials

      - name: Scan product wording
        run: npm run scan:wording

  greptile-review:
    name: greptile-review
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Trigger and verify Greptile review
        env:
          GREPTILE_API_KEY: ${{ secrets.GREPTILE_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BASE_REF: ${{ github.base_ref }}
        run: node .github/scripts/greptile-review.mjs
